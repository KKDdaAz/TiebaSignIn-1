name: Daily Tieba Sign-In

on:
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * *'  # 北京时间 6:30

# 第一处新增：必须开启写入权限，否则保活步骤会报错
permissions:
  contents: write

jobs:
  signin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'
          cache: 'maven'

      - name: Build and execute
        env:
          BDUSS: ${{ secrets.BDUSS }}
          SCKEY: ${{ secrets.SCKEY }}
        run: |
          mvn -B compile exec:java \
            -Dexec.mainClass="top.srcrs.Run" \
            -Dexec.args="$BDUSS $SCKEY"

      # 第二处新增：保活逻辑
      - name: Keepalive Workflow
        run: |
          git config --local user.email "github-actions[bot]@github.com"
          git config --local user.name "github-actions[bot]"
          # 设定每周一自动提交一次代码，重置 60 天倒计时
          if [ $(date +%u) -eq 1 ]; then
            echo "Last run: $(date)" > heartbeat.txt
            git add heartbeat.txt
            git commit -m "chore: keepalive workflow (auto-commit)"
            git push
          fi
